name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm lint
      - run: pnpm typecheck

  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm test

  e2e-and-a11y:
    runs-on: ubuntu-24.04
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_USER: droptix
          MARIADB_PASSWORD: droptix
          MARIADB_DATABASE: droptix_new
          MARIADB_ROOT_PASSWORD: droptix_root
        ports: ['3306:3306']
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized" --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: mysql://droptix:droptix@127.0.0.1:3306/droptix_new
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: ci_auth_secret_minimum_thirty_two_chars_long_______________
      AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      INTEGRATIONS_ENCRYPTION_KEY: "YmFzZTY0LWVuY29kZWQtMzItYnl0ZS1rZXkteXlweXlweXk="
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:push
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - name: Start server
        run: pnpm start &
      - name: Wait for server
        run: npx wait-on http://localhost:3000 -t 60000
      - run: pnpm test:e2e
      - run: pnpm test:a11y
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
